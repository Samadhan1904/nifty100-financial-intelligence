    typical_roe_min: 20
    typical_de_max:  0.5
    typical_opm_min: 20

  Financials:
    typical_roe_min: 12
    typical_de_max:  10.0   # Banks have high D/E structurally
    typical_opm_min: 20

  Consumer Staples:
    typical_roe_min: 18
    typical_de_max:  1.0
    typical_opm_min: 15

  Energy:
    typical_roe_min: 10
    typical_de_max:  2.0
    typical_opm_min: 8

  Materials:
    typical_roe_min: 10
    typical_de_max:  1.5
    typical_opm_min: 12

  Healthcare:
    typical_roe_min: 15
    typical_de_max:  0.8
    typical_opm_min: 15

  Industrials:
    typical_roe_min: 12
    typical_de_max:  1.5
    typical_opm_min: 10